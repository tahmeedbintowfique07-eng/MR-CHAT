<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MR - CHATTING | Blackpink Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

    <style>
        /* ==================== BLACKPINK PREMIUM STYLESHEET ==================== */
        :root {
            --bg-main: #0B0C10;
            --bg-sidebar: #12131C;
            --bg-card: #1F2029;
            --pink-primary: #FF007F;
            --pink-hover: #E0006C;
            --pink-light: #FF66B2;
            --text-main: #FFFFFF;
            --text-muted: #8F92A1;
            --glass-border: rgba(255, 0, 127, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100dvh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hidden { display: none !important; }

        /* Auth Container */
        .auth-box {
            background: var(--bg-sidebar);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 12px 40px rgba(255, 0, 127, 0.1);
            text-align: center;
        }

        /* লোগো ইমেজ স্টাইলিং */
        .auth-header-logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 2px solid var(--pink-primary);
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.5);
        }

        .auth-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: var(--bg-card);
            border: 1px solid transparent;
            border-radius: 12px;
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: var(--pink-primary);
            outline: none;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.2);
        }

        .main-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--pink-primary), var(--pink-light));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.3);
        }

        .main-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 127, 0.5);
        }

        /* App Layout */
        .app-container {
            display: flex;
            width: 100vw;
            height: 100dvh;
            background-color: var(--bg-main);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
        }

        .sidebar {
            width: 350px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--pink-primary);
        }

        .sidebar-header span {
            font-weight: 600;
            font-size: 1rem;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.3s;
        }

        .icon-btn:hover { color: var(--pink-primary); }

        .search-box { padding: 15px 20px; }
        .search-box .input-group { margin-bottom: 0; }

        .tabs-container {
            display: flex;
            padding: 5px 20px;
            gap: 5px;
        }

        .tab-link {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
            text-align: center;
        }

        .tab-link.active {
            color: var(--pink-primary);
            border-bottom-color: var(--pink-primary);
        }

        .user-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
        }

        .user-item-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 0, 127, 0.05);
            transition: background 0.3s;
        }

        .user-item-info:hover {
            background: rgba(255, 0, 127, 0.05);
        }

        .user-core {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .name { font-weight: 500; color: #fff; font-size: 0.95rem; }
        .subtext { font-size: 0.8rem; color: var(--text-muted); width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .action-btn-sm {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-pink { background: var(--pink-primary); color: white; }
        .btn-pink:hover { background: var(--pink-hover); }
        .btn-muted { background: var(--bg-card); color: var(--text-muted); border: 1px solid var(--glass-border); }
        .btn-muted:hover { background: rgba(255,255,255,0.05); }

        /* Chat Window Area */
        .chat-main {
            flex: 1;
            background: var(--bg-main);
            display: flex;
            flex-direction: column;
            position: relative;
            height: 100%;
        }

        .welcome-screen {
            display: flex;
            flex: 1;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* ওয়েলকাম স্ক্রিন লোগো স্টাইল */
        .welcome-logo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 2px solid var(--pink-primary);
            box-shadow: 0 0 25px rgba(255,0,127,0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 20px rgba(255,0,127,0.5); }
            50% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 35px rgba(255,0,127,0.8); }
            100% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 20px rgba(255,0,127,0.5); }
        }

        .chat-area {
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        .chat-header {
            padding: 20px;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 15px;
            flex-shrink: 0;
        }

        .messages-container {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-image: radial-gradient(rgba(255, 0, 127, 0.03) 1px, transparent 0);
            background-size: 24px 24px;
            -webkit-overflow-scrolling: touch;
        }

        .msg-row { display: flex; width: 100%; }
        .msg-row.sent { justify-content: flex-end; }
        .msg-row.received { justify-content: flex-start; }

        .msg-bubble {
            max-width: 65%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .sent .msg-bubble {
            background: linear-gradient(135deg, var(--pink-primary), #FF0055);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .received .msg-bubble {
            background: var(--bg-card);
            color: #fff;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .msg-meta {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.6);
            margin-top: 5px;
            text-align: right;
            display: block;
        }

        /* Message Input Area */
        .message-input-area {
            padding: 20px;
            background: var(--bg-sidebar);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 15px;
            align-items: center;
            flex-shrink: 0;
        }

        .message-input-area input {
            flex: 1;
            padding: 15px 20px;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .message-input-area input:focus {
            outline: none;
            border-color: var(--pink-primary);
        }

        .send-btn {
            width: 48px;
            height: 48px;
            background: var(--pink-primary);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(255, 0, 127, 0.3);
        }

        .send-btn:hover { transform: scale(1.05); background: var(--pink-hover); }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #FF007F;
            color: white;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(255,0,127,0.4);
            z-index: 9999;
            transition: all 0.3s ease;
        }

        /* Mobile Responsive Breakpoints */
        @media (max-width: 768px) {
            .sidebar { width: 100%; }
            .sidebar.mobile-hidden { display: none !important; }
            .chat-main { display: none; width: 100%; }
            .chat-main.mobile-active { display: flex !important; }
            #back-to-sidebar { display: inline-block !important; }
        }

        #back-to-sidebar { display: none; }
    </style>
</head>
<body>

    <div id="auth-container" class="auth-box">
        <div class="auth-header">
            <img src="1000035236.jpg" alt="MR CHAT LOGO" class="auth-header-logo">
            <h2>MR - CHATTING</h2>
            <p id="auth-subtitle">Welcome to the Premium Blackpink Workspace</p>
        </div>
        <form id="auth-form">
            <div class="input-group" id="username-field-group">
                <i class="fas fa-user"></i>
                <input type="text" id="auth-username" placeholder="Choose a unique username">
            </div>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="auth-email" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="auth-password" placeholder="Password (min 6 chars)" required>
            </div>
            <button type="submit" id="auth-submit-btn" class="main-btn">Sign Up</button>
        </form>
        <div style="margin-top:20px;">
            <p id="auth-toggle-text">Already have an account? <span id="auth-toggle-link" style="color: var(--pink-primary); cursor: pointer; font-weight: bold;">Login here</span></p>
        </div>
    </div>

    <div id="app-container" class="app-container hidden">
        <div class="sidebar" id="app-sidebar">
            <div class="sidebar-header">
                <div class="user-profile">
                    <img id="current-user-avatar" src="https://via.placeholder.com/40" class="avatar" alt="Avatar">
                    <span id="current-user-name">Loading...</span>
                </div>
                <button id="logout-btn" class="icon-btn"><i class="fas fa-arrow-right-from-bracket"></i></button>
            </div>
            
            <div class="search-box">
                <div class="input-group">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Search global users...">
                </div>
            </div>

            <div class="tabs-container">
                <button id="tab-chats" class="tab-link active">Chats</button>
                <button id="tab-friends" class="tab-link">All Users</button>
                <button id="tab-requests" class="tab-link">Requests <span id="req-badge" style="background:var(--pink-primary); color:white; border-radius:50%; padding:2px 6px; font-size:10px; display:none;">0</span></button>
            </div>

            <ul id="active-chats-list" class="user-list"></ul>
        </div>

        <div class="chat-main" id="chat-window-view">
            <div id="welcome-view" class="welcome-screen">
                <div class="welcome-content">
                    <img src="1000035236.jpg" alt="MR CHAT LOGO" class="welcome-logo">
                    <h2>MR - CHATTING WORKSPACE</h2>
                    <p style="color: var(--text-muted)">Select an active connection to initialize messaging.</p>
                </div>
            </div>

            <div id="active-chat-view" class="chat-area hidden">
                <div class="chat-header">
                    <button id="back-to-sidebar" class="icon-btn"><i class="fas fa-chevron-left"></i></button>
                    <div class="target-user-info" style="display:flex; align-items:center; gap:12px;">
                        <img id="chat-user-avatar" src="https://via.placeholder.com/40" class="avatar" alt="User">
                        <div>
                            <div id="chat-user-name" style="font-weight:600;">Username</div>
                            <div id="chat-user-status" style="font-size:0.8rem; color:var(--pink-light)">Online</div>
                        </div>
                    </div>
                </div>

                <div id="messages-display" class="messages-container"></div>

                <form id="message-form" class="message-input-area">
                    <input type="text" id="message-input" placeholder="Drop a premium message here..." autocomplete="off" required>
                    <button type="submit" class="send-btn"><i class="fas fa-paper-plane"></i></button>
                </form>
            </div>
        </div>
    </div>

    <div id="app-notification" class="toast hidden"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        // [CRITICAL BUG FIX]: getFirestore মেথডটি ডুপ্লিকেট ইমপোর্ট বাদ দিয়ে সঠিক ডোমেন থেকে ইমপোর্ট করা হলো
        import { getFirestore, doc, setDoc, collection, query, where, or, and, orderBy, onSnapshot, addDoc, getDocs, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCr9Bfn4Ep-qw9JFkguyak00dsN90GSgRY",
            authDomain: "mr-chatting-ff2b6.firebaseapp.com",
            projectId: "mr-chatting-ff2b6",
            storageBucket: "mr-chatting-ff2b6.firebasestorage.app",
            messagingSenderId: "710151594912",
            appId: "1:710151594912:web:bc2861e503db1481223ac5",
            measurementId: "G-NNXG57V3KL"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Core DOM References
        const authContainer = document.getElementById("auth-container");
        const appContainer = document.getElementById("app-container");
        const appSidebar = document.getElementById("app-sidebar");
        const chatWindowView = document.getElementById("chat-window-view");
        const authForm = document.getElementById("auth-form");
        const usernameFieldGroup = document.getElementById("username-field-group");
        const authUsername = document.getElementById("auth-username");
        const authEmail = document.getElementById("auth-email");
        const authPassword = document.getElementById("auth-password");
        const authSubmitBtn = document.getElementById("auth-submit-btn");
        const authSubtitle = document.getElementById("auth-subtitle");
        const authToggleText = document.getElementById("auth-toggle-text");
        const activeChatsList = document.getElementById("active-chats-list");
        const searchInput = document.getElementById("search-input");
        const welcomeView = document.getElementById("welcome-view");
        const activeChatView = document.getElementById("active-chat-view");
        const chatUserName = document.getElementById("chat-user-name");
        const chatUserAvatar = document.getElementById("chat-user-avatar");
        const chatUserStatus = document.getElementById("chat-user-status");
        const messagesDisplay = document.getElementById("messages-display");
        const messageForm = document.getElementById("message-form");
        const messageInput = document.getElementById("message-input");
        const backToSidebar = document.getElementById("back-to-sidebar");
        const logoutBtn = document.getElementById("logout-btn");
        const tabChats = document.getElementById("tab-chats");
        const tabFriends = document.getElementById("tab-friends");
        const tabRequests = document.getElementById("tab-requests");
        const reqBadge = document.getElementById("req-badge");

        let currentUser = null;
        let activeChatUserId = null;
        let unsubscribeMessagesSub = null;
        let unsubscribeRealtimeStream = null; 
        let isLoginMode = false; 
        let activeTab = "chats";
        let typingTimeout = null;

        function getChatRoomId(uid1, uid2) {
            return uid1 < uid2 ? `${uid1}_${uid2}` : `${uid2}_${uid1}`;
        }

        document.addEventListener("click", function(e) {
            if(e.target && e.target.id === 'auth-toggle-link'){
                isLoginMode = !isLoginMode;
                if (isLoginMode) {
                    usernameFieldGroup.style.display = "none";
                    authSubmitBtn.innerText = "Login";
                    authToggleText.innerHTML = `Don't have an account? <span id="auth-toggle-link" style="color:var(--pink-primary); cursor:pointer; font-weight:bold;">Register here</span>`;
                } else {
                    usernameFieldGroup.style.display = "flex";
                    authSubmitBtn.innerText = "Sign Up";
                    authToggleText.innerHTML = `Already have an account? <span id="auth-toggle-link" style="color:var(--pink-primary); cursor:pointer; font-weight:bold;">Login here</span>`;
                }
            }
        });

        authForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = authEmail.value.trim();
            const password = authPassword.value;
            const username = authUsername.value.trim();

            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, password);
                    showToast("Workspace authorized!");
                } else {
                    if(!username) { alert("Please input a valid username."); return; }
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;
                    await updateProfile(user, { displayName: username });
                    await setDoc(doc(db, "users", user.uid), {
                        uid: user.uid,
                        username: username,
                        email: email,
                        photoURL: `https://api.dicebear.com/7.x/adventurer/svg?seed=${username}`,
                        status: "online",
                        isTypingTo: null,
                        lastSeen: new Date().getTime()
                    });
                    showToast("Account profile mapped successfully!");
                }
            } catch (error) { alert("Auth Failure: " + error.message); }
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                authContainer.classList.add("hidden");
                appContainer.classList.remove("hidden");
                document.getElementById("current-user-name").innerText = user.displayName || "User";
                document.getElementById("current-user-avatar").src = user.photoURL || `https://api.dicebear.com/7.x/adventurer/svg?seed=${user.displayName}`;
                try { await updateDoc(doc(db, "users", user.uid), { status: "online" }); } catch(e) {}
                switchTab("chats");
                listenRequestBadge();
            } else {
                currentUser = null;
                appContainer.classList.add("hidden");
                authContainer.classList.remove("hidden");
            }
        });

        if(logoutBtn) {
            logoutBtn.addEventListener("click", async () => {
                if (currentUser) { try { await updateDoc(doc(db, "users", currentUser.uid), { status: "offline", isTypingTo: null, lastSeen: new Date().getTime() }); } catch(e) {} }
                signOut(auth).then(() => { window.location.reload(); });
            });
        }

        function listenRequestBadge() {
            const qReq = query(collection(db, "friendRequests"), where("receiverId", "==", currentUser.uid), where("status", "==", "pending"));
            onSnapshot(qReq, (snap) => {
                if(!snap.empty) {
                    reqBadge.innerText = snap.size;
                    reqBadge.style.display = "inline-block";
                } else { reqBadge.style.display = "none"; }
            });
        }

        function switchTab(tabName) {
            activeTab = tabName;
            tabChats.classList.remove("active");
            tabFriends.classList.remove("active");
            tabRequests.classList.remove("active");
            
            if(unsubscribeRealtimeStream) { unsubscribeRealtimeStream(); unsubscribeRealtimeStream = null; }
            activeChatsList.innerHTML = "";

            if (tabName === "chats") {
                tabChats.classList.add("active");
                loadAcceptedChatsStream();
            } else if (tabName === "friends") {
                tabFriends.classList.add("active");
                loadGlobalUsersExplore();
            } else if (tabName === "requests") {
                tabRequests.classList.add("active");
                loadIncomingRequestsStream();
            }
        }
        window.switchTab = switchTab; 

        tabChats.addEventListener("click", () => switchTab("chats"));
        tabFriends.addEventListener("click", () => switchTab("friends"));
        tabRequests.addEventListener("click", () => switchTab("requests"));

        function loadAcceptedChatsStream() {
            const qFriendships = query(collection(db, "friendships"), or(where("user1", "==", currentUser.uid), where("user2", "==", currentUser.uid)));
            unsubscribeRealtimeStream = onSnapshot(qFriendships, async (snapshot) => {
                if (activeTab !== "chats" || searchInput.value.trim()) return;
                activeChatsList.innerHTML = "";
                
                if (snapshot.empty) {
                    activeChatsList.innerHTML = `<p style="padding:20px; text-align:center; color:var(--text-muted); font-size:0.85rem;">No active connections. Go to All Users to connect!</p>`;
                    return;
                }

                let friendshipsList = [];
                snapshot.forEach(doc => friendshipsList.push(doc.data()));
                friendshipsList.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

                const renderedUserIds = new Set();

                for (let fData of friendshipsList) {
                    const targetUid = fData.user1 === currentUser.uid ? fData.user2 : fData.user1;
                    if (renderedUserIds.has(targetUid)) continue;
                    renderedUserIds.add(targetUid);

                    const uSnap = await getDocs(query(collection(db, "users"), where("uid", "==", targetUid)));
                    if (!uSnap.empty) {
                        renderUserRow(uSnap.docs[0].data(), fData.lastMessage || "Tap to chat", "chat_click");
                    }
                }
            });
        }

        async function loadGlobalUsersExplore() {
            activeChatsList.innerHTML = `<p style="padding:20px; text-align:center; color:var(--text-muted);">Syncing workspace database...</p>`;
            
            const reqSnap = await getDocs(collection(db, "friendRequests"));
            const activeRelations = new Map(); 

            reqSnap.forEach(doc => {
                const d = doc.data();
                const sender = d.senderId || d.from;
                const receiver = d.receiverId || d.to;
                if(sender === currentUser.uid || receiver === currentUser.uid) {
                    const counterPart = sender === currentUser.uid ? receiver : sender;
                    activeRelations.set(counterPart, { type: 'request', status: d.status, isSender: sender === currentUser.uid });
                }
            });

            const fsSnap = await getDocs(collection(db, "friendships"));
            fsSnap.forEach(doc => {
                const d = doc.data();
                if(d.user1 === currentUser.uid || d.user2 === currentUser.uid) {
                    const counterPart = d.user1 === currentUser.uid ? d.user2 : d.user1;
                    activeRelations.set(counterPart, { type: 'friend' });
                }
            });

            const userSnap = await getDocs(query(collection(db, "users")));
            activeChatsList.innerHTML = "";

            let count = 0;
            userSnap.forEach(uDoc => {
                const u = uDoc.data();
                if(u.uid !== currentUser.uid) {
                    count++;
                    const relation = activeRelations.get(u.uid);
                    let buttonHTML = `<button class="action-btn-sm btn-pink" onclick="sendFriendRequest('${u.uid}')"><i class="fas fa-user-plus"></i> Add</button>`;
                    
                    if(relation) {
                        if(relation.type === 'friend') {
                            buttonHTML = `<span style="color:var(--pink-light); font-size:0.8rem; font-weight:600;"><i class="fas fa-check-circle"></i> Friends</span>`;
                        } else if(relation.type === 'request') {
                            if(relation.status === 'pending') {
                                buttonHTML = relation.isSender ? 
                                    `<button class="action-btn-sm btn-muted" disabled>Requested</button>` : 
                                    `<button class="action-btn-sm btn-pink" onclick="window.switchTab('requests')">Review</button>`;
                            } else if(relation.status === 'accepted') {
                                buttonHTML = `<span style="color:var(--pink-light); font-size:0.8rem; font-weight:600;"><i class="fas fa-check-circle"></i> Friends</span>`;
                            }
                        }
                    }
                    renderUserRow(u, `@${u.username}`, "action", buttonHTML);
                }
            });

            if(count === 0) activeChatsList.innerHTML = `<p style="padding:20px; text-align:center; color:var(--text-muted);">No users found.</p>`;
        }

        function loadIncomingRequestsStream() {
            const qReq = query(collection(db, "friendRequests"), where("receiverId", "==", currentUser.uid), where("status", "==", "pending"));
            unsubscribeRealtimeStream = onSnapshot(qReq, async (snap) => {
                if (activeTab !== "requests") return;
                activeChatsList.innerHTML = "";

                if(snap.empty) {
                    activeChatsList.innerHTML = `<p style="padding:20px; text-align:center; color:var(--text-muted); font-size:0.85rem;">No incoming requests.</p>`;
                    return;
                }

                for (let rDoc of snap.docs) {
                    const rData = rDoc.data();
                    const senderUid = rData.senderId || rData.from;
                    if(!senderUid) continue;

                    const uSnap = await getDocs(query(collection(db, "users"), where("uid", "==", senderUid)));
                    if(!uSnap.empty) {
                        const senderData = uSnap.docs[0].data();
                        const actionButtons = `
                            <div style="display:flex; gap:5px;">
                                <button class="action-btn-sm btn-pink" onclick="acceptFriendRequest('${rDoc.id}', '${senderUid}')">Accept</button>
                                <button class="action-btn-sm btn-muted" onclick="rejectFriendRequest('${rDoc.id}')">Reject</button>
                            </div>
                        `;
                        renderUserRow(senderData, "Wants to connect", "action", actionButtons);
                    }
                }
            });
        }

        window.sendFriendRequest = async function(targetUid) {
            try {
                const reqId = `${currentUser.uid}_${targetUid}`;
                await setDoc(doc(db, "friendRequests", reqId), {
                    senderId: currentUser.uid,
                    from: currentUser.uid,
                    receiverId: targetUid,
                    to: targetUid,
                    status: "pending",
                    timestamp: new Date().getTime()
                });
                showToast("Request sent!");
                loadGlobalUsersExplore();
            } catch(e) { alert(e.message); }
        };

        window.acceptFriendRequest = async function(reqDocId, senderUid) {
            try {
                await deleteDoc(doc(db, "friendRequests", reqDocId));
                const roomId = getChatRoomId(currentUser.uid, senderUid);
                await setDoc(doc(db, "friendships", roomId), {
                    user1: currentUser.uid < senderUid ? currentUser.uid : senderUid,
                    user2: currentUser.uid < senderUid ? senderUid : currentUser.uid,
                    lastMessage: "Connection established! Say hi.",
                    timestamp: new Date().getTime()
                });
                showToast("Connection initialized!");
                switchTab("chats");
            } catch(e) { alert(e.message); }
        };

        window.rejectFriendRequest = async function(reqDocId) {
            try {
                await deleteDoc(doc(db, "friendRequests", reqDocId));
                showToast("Request declined.");
                switchTab("requests");
            } catch(e) { alert(e.message); }
        };

        async function openChatWindowWithTargetUser(targetUid) {
            activeChatUserId = targetUid;
            appSidebar.classList.add("mobile-hidden");
            chatWindowView.classList.add("mobile-active");
            welcomeView.classList.add("hidden");
            activeChatView.classList.remove("hidden");

            onSnapshot(doc(db, "users", targetUid), (docSnap) => {
                if(docSnap.exists() && activeChatUserId === targetUid) {
                    const data = docSnap.data();
                    chatUserName.innerText = data.username;
                    chatUserAvatar.src = data.photoURL || 'https://via.placeholder.com/40';
                    
                    if (data.isTypingTo === currentUser.uid) {
                        chatUserStatus.innerText = "Typing...";
                        chatUserStatus.style.color = "var(--pink-light)";
                    } else {
                        chatUserStatus.innerText = data.status === "online" ? "Active Workspace" : "Away";
                        chatUserStatus.style.color = data.status === "online" ? "var(--pink-light)" : "var(--text-muted)";
                    }
                }
            });

            if (unsubscribeMessagesSub) unsubscribeMessagesSub();

            const targetRoomId = getChatRoomId(currentUser.uid, targetUid);
            const msgCollectionRef = collection(db, "friendships", targetRoomId, "chat_messages");

            unsubscribeMessagesSub = onSnapshot(msgCollectionRef, (snapshot) => {
                if (activeChatUserId !== targetUid) return;
                let combinedList = [];
                snapshot.forEach(doc => {
                    combinedList.push({ id: doc.id, ...doc.data() });
                });
                
                combinedList.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

                messagesDisplay.innerHTML = "";
                combinedList.forEach(msgData => renderSingleMessageBubble(msgData));
                messagesDisplay.scrollTop = messagesDisplay.scrollHeight;
            }, (error) => {
                console.error("Firestore Messaging Loop Disconnect Error:", error);
            });
        }
        window.openChatWindowWithTargetUser = openChatWindowWithTargetUser;

        function renderUserRow(userData, subtext, type, actionHTML = "") {
            const li = document.createElement("li");
            li.innerHTML = `
                <div class="user-item-info">
                    <div class="user-core">
                        <div style="position:relative;">
                            <img src="${userData.photoURL || 'https://via.placeholder.com/40'}" class="avatar">
                            <span style="position:absolute; bottom:0; right:0; width:10px; height:10px; border-radius:50%; background:${userData.status === 'online' ? 'var(--pink-primary)' : '#555'}; border:2px solid var(--bg-sidebar);"></span>
                        </div>
                        <div style="display:flex; flex-direction:column;">
                            <span class="name">${userData.username}</span>
                            <span class="subtext">${subtext}</span>
                        </div>
                    </div>
                    <div class="user-action-side">${type === 'action' ? actionHTML : ''}</div>
                </div>
            `;
            if(type === "chat_click") {
                li.style.cursor = "pointer";
                li.addEventListener("click", () => window.openChatWindowWithTargetUser(userData.uid));
            }
            activeChatsList.appendChild(li);
        }

        messageInput.addEventListener("input", async () => {
            if (!currentUser || !activeChatUserId) return;
            try {
                await updateDoc(doc(db, "users", currentUser.uid), { isTypingTo: activeChatUserId });
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(async () => {
                    await updateDoc(doc(db, "users", currentUser.uid), { isTypingTo: null });
                }, 2000);
            } catch (err) { console.error(err); }
        });

        messageForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const txt = messageInput.value.trim();
            if (!txt || !activeChatUserId || !currentUser) return;

            messageInput.value = "";
            clearTimeout(typingTimeout);
            try { await updateDoc(doc(db, "users", currentUser.uid), { isTypingTo: null }); } catch(err){}

            const currentTimestamp = new Date().getTime();
            const roomId = getChatRoomId(currentUser.uid, activeChatUserId);

            try {
                const chatRoomRef = doc(db, "friendships", roomId);
                const msgCollectionRef = collection(chatRoomRef, "chat_messages");

                await addDoc(msgCollectionRef, {
                    senderId: currentUser.uid,
                    receiverId: activeChatUserId,
                    text: txt,
                    timestamp: currentTimestamp
                });

                await setDoc(chatRoomRef, {
                    user1: currentUser.uid < activeChatUserId ? currentUser.uid : activeChatUserId,
                    user2: currentUser.uid < activeChatUserId ? activeChatUserId : currentUser.uid,
                    lastMessage: txt,
                    timestamp: currentTimestamp
                }, { merge: true });

            } catch(err) { 
                console.error("Transmission Blocked runtime error: ", err); 
                showToast("Failed to distribute real-time message.");
            }
        });

        function renderSingleMessageBubble(msgData) {
            const isSent = msgData.senderId === currentUser.uid;
            const row = document.createElement("div");
            row.classList.add("msg-row", isSent ? "sent" : "received");

            let timeString = "Just Now";
            if (msgData.timestamp) {
                timeString = new Date(msgData.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }

            row.innerHTML = `
                <div class="msg-bubble">
                    <p style="word-break: break-all;">${escapeHTML(msgData.text)}</p>
                    <span class="msg-meta">${timeString}</span>
                </div>
            `;
            messagesDisplay.appendChild(row);
        }

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                const appContainerEl = document.getElementById("app-container");
                if (appContainerEl) {
                    appContainerEl.style.height = `${window.visualViewport.height}px`;
                    appContainerEl.style.top = `${window.visualViewport.offsetTop}px`;
                }
                if(activeChatUserId) {
                    setTimeout(() => {
                        messagesDisplay.scrollTop = messagesDisplay.scrollHeight;
                    }, 100);
                }
            });
            
            window.visualViewport.addEventListener('scroll', () => {
                const appContainerEl = document.getElementById("app-container");
                if (appContainerEl) {
                    appContainerEl.style.top = `${window.visualViewport.offsetTop}px`;
                }
            });
        }

        if(backToSidebar) {
            backToSidebar.addEventListener("click", () => {
                appSidebar.classList.remove("mobile-hidden");
                chatWindowView.classList.remove("mobile-active");
                activeChatView.classList.add("hidden");
                welcomeView.classList.remove("hidden");
                activeChatUserId = null;
            });
        }

        searchInput.addEventListener("input", async () => {
            const searchText = searchInput.value.trim().toLowerCase();
            if(!searchText) { switchTab(activeTab); return; }
            if(unsubscribeRealtimeStream) { unsubscribeRealtimeStream(); unsubscribeRealtimeStream = null; }

            const userSnap = await getDocs(query(collection(db, "users")));
            activeChatsList.innerHTML = "";
            let found = false;
            userSnap.forEach(uDoc => {
                const u = uDoc.data();
                if(u.uid !== currentUser.uid && u.username.toLowerCase().includes(searchText)) {
                    found = true;
                    renderUserRow(u, `@${u.username}`, "action", `<button class="action-btn-sm btn-pink" onclick="window.openChatWindowWithTargetUser('${u.uid}')">Message</button>`);
                }
            });
            if(!found) activeChatsList.innerHTML = `<p style="padding:20px; text-align:center; color:var(--text-muted);">No users found via input query.</p>`;
        });

        function showToast(msg) {
            const toast = document.getElementById("app-notification");
            if(toast) {
                toast.innerText = msg;
                toast.classList.remove("hidden");
                setTimeout(() => toast.classList.add("hidden"), 3500);
            }
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }
    </script>
</body>
</html>
