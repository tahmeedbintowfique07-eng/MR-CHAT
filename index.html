<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MR - CHATTING PREMIUM</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

    <style>
        :root {
            --bg-main: #0B0C10;
            --bg-sidebar: #12131C;
            --bg-card: #1F2029;
            --pink-primary: #FF007F;
            --pink-hover: #E0006C;
            --pink-light: #FF66B2;
            --text-main: #FFFFFF;
            --text-muted: #8F92A1;
            --glass-border: rgba(255, 0, 127, 0.15);
            
            --status-sent: #8F92A1;
            --status-delivered: #CCCCCC;
            --status-seen: #00E6FF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100dvh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hidden { display: none !important; }

        /* Auth Box */
        .auth-box {
            background: var(--bg-sidebar);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 12px 40px rgba(255, 0, 127, 0.1);
            text-align: center;
        }

        .auth-header-logo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin: 0 auto 15px auto;
            border: 2px solid var(--pink-primary);
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.6);
            background-color: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            color: var(--text-muted);
            z-index: 2;
        }

        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: var(--bg-card);
            border: 1px solid transparent;
            border-radius: 12px;
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: var(--pink-primary);
            outline: none;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.2);
        }

        .main-btn {
            width: 100%;
            padding: 15px;
            background: var(--pink-primary);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .main-btn:hover { background: var(--pink-hover); }

        /* Main Container Layout */
        .app-container {
            display: flex;
            width: 100vw;
            height: 100dvh;
            background-color: var(--bg-main);
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
        }

        .sidebar {
            width: 350px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--pink-primary);
        }

        .sidebar-header span {
            font-weight: 600;
            font-size: 1rem;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.3s;
        }

        .icon-btn:hover { color: var(--pink-primary); }

        .search-box { padding: 15px 20px; }
        .search-box .input-group { margin-bottom: 0; }

        .tabs-container {
            display: flex;
            padding: 5px 20px;
            gap: 5px;
        }

        .tab-link {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
            text-align: center;
        }

        .tab-link.active {
            color: var(--pink-primary);
            border-bottom-color: var(--pink-primary);
        }

        .user-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
        }

        .user-item-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 0, 127, 0.05);
            transition: background 0.3s;
        }

        .user-item-info:hover {
            background: rgba(255, 0, 127, 0.05);
        }

        .user-core {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .name { font-weight: 500; color: #fff; font-size: 0.95rem; }
        .subtext { font-size: 0.8rem; color: var(--text-muted); width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .action-btn-sm {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-pink { background: var(--pink-primary); color: white; }
        .btn-pink:hover { background: var(--pink-hover); }
        .btn-muted { background: var(--bg-card); color: var(--text-muted); border: 1px solid var(--glass-border); }

        /* Chat Core Elements */
        .chat-main {
            flex: 1;
            background: var(--bg-main);
            display: flex;
            flex-direction: column;
            position: relative;
            height: 100%;
        }

        .welcome-screen {
            display: flex;
            flex: 1;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .welcome-logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 20px auto;
            border: 2px solid var(--pink-primary);
            box-shadow: 0 0 25px rgba(255,0,127,0.5);
            animation: pulse 2s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-sidebar);
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(255,0,127,0.5); }
            50% { transform: scale(1.03); box-shadow: 0 0 35px rgba(255,0,127,0.8); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(255,0,127,0.5); }
        }

        .chat-area {
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        .chat-header {
            padding: 20px;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 15px;
            flex-shrink: 0;
        }

        .messages-container {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-image: radial-gradient(rgba(255, 0, 127, 0.03) 1px, transparent 0);
            background-size: 24px 24px;
            -webkit-overflow-scrolling: touch;
        }

        .msg-row { display: flex; width: 100%; }
        .msg-row.sent { justify-content: flex-end; }
        .msg-row.received { justify-content: flex-start; }

        .msg-bubble {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .sent .msg-bubble {
            background: linear-gradient(135deg, var(--pink-primary), #FF0055);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .received .msg-bubble {
            background: var(--bg-card);
            color: #fff;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .msg-media-content {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 5px;
            display: block;
            max-height: 200px;
            object-fit: cover;
        }

        /* PREMIUM CUSTOM AUDIO PLAYER UI */
        .premium-audio-player {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 220px;
            padding: 6px 0;
            color: #fff;
        }
        
        .audio-control-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        .audio-control-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .audio-timeline-track {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }
        
        .audio-timeline-fill {
            height: 100%;
            width: 0%;
            background: #fff;
            border-radius: 2px;
            position: absolute;
            top: 0; left: 0;
        }
        
        .audio-time-stamp {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.8);
            font-variant-numeric: tabular-nums;
        }

        .msg-meta-wrapper {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 5px;
            margin-top: 5px;
        }

        .msg-meta {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.6);
        }

        .status-tick {
            font-size: 0.75rem;
            display: inline-flex;
            align-items: center;
        }
        .status-tick.sent { color: var(--status-sent); }
        .status-tick.delivered { color: var(--status-delivered); }
        .status-tick.seen { color: var(--status-seen); }

        .message-input-area {
            padding: 20px;
            background: var(--bg-sidebar);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 12px;
            align-items: center;
            flex-shrink: 0;
            position: relative;
        }

        .message-input-area input {
            flex: 1;
            padding: 15px 20px;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .message-input-area input:focus {
            outline: none;
            border-color: var(--pink-primary);
        }

        .send-btn {
            width: 48px;
            height: 48px;
            background: var(--pink-primary);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(255, 0, 127, 0.3);
            flex-shrink: 0;
        }

        .send-btn:hover { transform: scale(1.05); background: var(--pink-hover); }

        /* Floating Overlaid GIF Panel Config */
        .gif-container-panel {
            position: absolute;
            bottom: 95px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 380px;
            background: var(--bg-sidebar);
            border: 1px solid var(--pink-primary);
            border-radius: 20px;
            padding: 16px;
            z-index: 999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            max-height: 320px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .gif-search-bar {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .gif-search-bar input {
            flex: 1;
            padding: 10px 14px;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: #fff;
            font-size: 0.85rem;
        }
        .gif-results-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            overflow-y: auto;
            flex: 1;
        }
        .gif-results-grid img {
            width: 100%;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .gif-results-grid img:hover {
            transform: scale(1.05);
            box-shadow: 0 0 8px var(--pink-primary);
        }

        /* Voice Recording Pulse Node Styles */
        .voice-recording-active .icon-btn i.fa-microphone {
            color: var(--pink-primary);
            animation: mic-blink 1s infinite alternate;
        }
        @keyframes mic-blink {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0.3; transform: scale(1.2); }
        }

        .attachment-preview-bar {
            background: var(--bg-card);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid var(--glass-border);
        }
        .attachment-preview-bar img {
            height: 50px;
            border-radius: 6px;
            border: 1px solid var(--pink-primary);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #FF007F;
            color: white;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(255,0,127,0.4);
            z-index: 9999;
        }

        @media (max-width: 768px) {
            .sidebar { width: 100%; }
            .sidebar.mobile-hidden { display: none !important; }
            .chat-main { display: none; width: 100%; }
            .chat-main.mobile-active { display: flex !important; }
            #back-to-sidebar { display: inline-block !important; }
        }

        #back-to-sidebar { display: none; }
    </style>
</head>
<body>

    <div id="auth-container" class="auth-box">
        <div class="auth-header">
            <div class="auth-header-logo">
                <svg width="50" height="50" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM12 6C13.66 6 15 7.34 15 9C15 10.66 13.66 12 12 12C10.34 12 9 10.66 9 9C9 7.34 10.34 6 12 6ZM12 18C9.33 18 4.67 19.33 4.67 22C6.24 23.57 8.51 24.5 11 24.5C14.7 24.5 17.8 22.3 19.1 19.2C17.8 18.4 14.9 18 12 18Z" fill="#FF007F"/>
                    <path d="M20 2H14V4H20V10H22V4C22 2.9 21.1 2 20 2Z" fill="#FF66B2"/>
                </svg>
            </div>
            <h2>MR CHATROOM</h2>
            <p id="auth-subtitle">Welcome to your secure workspace hub.</p>
        </div>
        <form id="auth-form">
            <div class="input-group" id="username-field-group">
                <i class="fas fa-user"></i>
                <input type="text" id="auth-username" placeholder="Choose a unique username">
            </div>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="auth-email" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="auth-password" placeholder="Password (min 6 chars)" required>
            </div>
            <button type="submit" id="auth-submit-btn" class="main-btn">Sign Up</button>
        </form>
        <div style="margin-top:20px;">
            <p id="auth-toggle-text">Already have an account? <span id="auth-toggle-link" style="color: var(--pink-primary); cursor: pointer; font-weight: bold;">Login here</span></p>
        </div>
    </div>

    <div id="app-container" class="app-container hidden">
        <div class="sidebar" id="app-sidebar">
            <div class="sidebar-header">
                <div class="user-profile">
                    <img id="current-user-avatar" src="https://via.placeholder.com/40" class="avatar" alt="Avatar">
                    <span id="current-user-name">Loading...</span>
                </div>
                <div>
                    <button id="open-profile-btn" class="icon-btn" style="margin-right: 15px;"><i class="fas fa-user-gear"></i></button>
                    <button id="logout-btn" class="icon-btn"><i class="fas fa-arrow-right-from-bracket"></i></button>
                </div>
            </div>
            
            <div class="search-box">
                <div class="input-group">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Search global users...">
                </div>
            </div>

            <div class="tabs-container">
                <button id="tab-chats" class="tab-link active">Chats</button>
                <button id="tab-friends" class="tab-link">All Users</button>
                <button id="tab-requests" class="tab-link">Requests <span id="req-badge" style="background:var(--pink-primary); color:white; border-radius:50%; padding:2px 6px; font-size:10px; display:none;">0</span></button>
            </div>

            <ul id="active-chats-list" class="user-list"></ul>
        </div>

        <div class="chat-main" id="chat-window-view">
            <div id="welcome-view" class="welcome-screen">
                <div class="welcome-content">
                    <div class="welcome-logo">
                        <svg width="70" height="70" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM12 6C13.66 6 15 7.34 15 9C15 10.66 13.66 12 12 12C10.34 12 9 10.66 9 9C9 7.34 10.34 6 12 6ZM12 18C9.33 18 4.67 19.33 4.67 22C6.24 23.57 8.51 24.5 11 24.5C14.7 24.5 17.8 22.3 19.1 19.2C17.8 18.4 14.9 18 12 18Z" fill="#FF007F"/>
                            <path d="M20 2H14V4H20V10H22V4C22 2.9 21.1 2 20 2Z" fill="#FF66B2"/>
                        </svg>
                    </div>
                    <h2>MR CHAT ROOM</h2>
                    <p style="color: var(--text-muted)">Select a secure connection to initialize your conversation.</p>
                </div>
            </div>

            <div id="active-chat-view" class="chat-area hidden">
                <div class="chat-header">
                    <button id="back-to-sidebar" class="icon-btn"><i class="fas fa-chevron-left"></i></button>
                    <div id="target-user-profile-trigger" class="target-user-info" style="display:flex; align-items:center; gap:12px; cursor:pointer;">
                        <img id="chat-user-avatar" src="https://via.placeholder.com/40" class="avatar" alt="User">
                        <div>
                            <div id="chat-user-name" style="font-weight:600;">Username</div>
                            <div id="chat-user-status" style="font-size:0.8rem; color:var(--text-muted)">Offline</div>
                        </div>
                    </div>
                </div>

                <div id="messages-display" class="messages-container"></div>

                <!-- Floating Overlaid GIF Selector Panel -->
                <div id="gif-panel" class="gif-container-panel hidden">
                    <div class="gif-search-bar">
                        <input type="text" id="gif-search-input" placeholder="Search Engine (Tenor/Giphy)...">
                        <button id="close-gif-btn" class="icon-btn"><i class="fas fa-times"></i></button>
                    </div>
                    <div id="gif-results" class="gif-results-grid"></div>
                </div>

                <!-- Pre-send Image/Voice Queue Bar -->
                <div id="inbox-img-preview-bar" class="attachment-preview-bar hidden">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <img id="inbox-preview-img-src" src="" class="hidden">
                        <span id="attachment-status-text" style="font-size:0.8rem; color:var(--text-muted);">Ready to push...</span>
                    </div>
                    <button id="cancel-inbox-img-btn" type="button" class="icon-btn" style="color:red;"><i class="fas fa-trash"></i></button>
                </div>

                <form id="message-form" class="message-input-area">
                    <button type="button" id="inbox-photo-trigger-btn" class="icon-btn"><i class="fas fa-image"></i></button>
                    <button type="button" id="inbox-gif-trigger-btn" class="icon-btn"><i class="fas fa-face-smile"></i></button>
                    <button type="button" id="inbox-voice-trigger-btn" class="icon-btn"><i class="fas fa-microphone"></i></button>
                    
                    <input type="file" id="inbox-file-input" accept="image/*" class="hidden">
                    <input type="text" id="message-input" placeholder="Drop a premium message here..." autocomplete="off">
                    
                    <button type="submit" class="send-btn"><i class="fas fa-paper-plane"></i></button>
                </form>
            </div>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profile-modal" class="hidden" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 10000; padding: 20px;">
        <div class="auth-box" style="position: relative; max-width: 420px; width: 100%;">
            <button id="close-profile-btn" style="position: absolute; top: 20px; right: 20px; background: transparent; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer;"><i class="fas fa-times"></i></button>
            <div class="auth-header">
                <h2 id="modal-title">Edit Profile</h2>
                <p id="modal-subtitle">Update your network identity and details</p>
            </div>
            <form id="profile-update-form">
                <div style="margin-bottom: 25px; display: flex; flex-direction: column; align-items: center; gap: 10px;">
                    <img id="modal-preview-avatar" src="https://via.placeholder.com/90" style="width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--pink-primary); object-fit: cover;">
                    <label id="upload-dp-label" for="profile-dp-input" class="action-btn-sm btn-pink" style="cursor: pointer; display: inline-block; padding: 8px 15px;"><i class="fas fa-camera"></i> Select Photo</label>
                    <input type="file" id="profile-dp-input" accept="image/*" class="hidden">
                </div>

            if (mins < 60) return `Active ${mins}m ago`;
            const hours = Math.floor(mins / 60);
            if (hours < 24) return `Active ${hours}h ago`;
            return new Date(timestamp).toLocaleDateString([], { month: 'short', day: 'numeric' });
        }

        async function loadGlobalUsersExplore() {
            activeChatsList.innerHTML = `<p style="padding:20px; text-align:center; color:var(--text-muted);">Syncing secure cloud data...</p>`;
            try {
                const reqSnap = await getDocs(collection(db, "friendRequests"));
                const activeRelations = new Map(); 

                reqSnap.forEach(doc => {
                    const d = doc.data();
                    const sender = d.senderId || d.from;
                    const receiver = d.receiverId || d.to;
                    if(sender === currentUser.uid || receiver === currentUser.uid) {
                        const counterPart = sender === currentUser.uid ? receiver : sender;
                        activeRelations.set(counterPart, { type: 'request', status: d.status, isSender: sender === currentUser.uid });
                    }
                });

                const fsSnap = await getDocs(collection(db, "friendships"));
                fsSnap.forEach(doc => {
                    const d = doc.data();
                    if(d.user1 === currentUser.uid || d.user2 === currentUser.uid) {
                        const counterPart = d.user1 === currentUser.uid ? d.user2 : d.user1;
                        activeRelations.set(counterPart, { type: 'friend' });
                    }
                });

                const userSnap = await getDocs(query(collection(db, "users")));
                activeChatsList.innerHTML = "";

                let count = 0;
                userSnap.forEach(uDoc => {
                    const u = uDoc.data();
                    if(u.uid !== currentUser.uid) {
                        count++;
                        const relation = activeRelations.get(u.uid);
                        let buttonHTML = `<button class="action-btn-sm btn-pink" onclick="sendFriendRequest('${u.uid}')"><i class="fas fa-user-plus"></i> Add</button>`;
                        
                        if(relation) {

                        const subDescription = u.status === "online" ? "Online" : formatLastSeen(u.lastSeen);

                    }
                });

                if(count === 0) activeChatsList.innerHTML = `<p style="padding:20px; text-align:center; color:var(--text-muted);">No global accounts indexed.</p>`;

        async function openChatWindowWithTargetUser(targetUid) {
            activeChatUserId = targetUid;

            if (unsubscribeTargetUserStatus) unsubscribeTargetUserStatus();

            unsubscribeTargetUserStatus = onSnapshot(doc(db, "users", targetUid), (docSnap) => {

            const msgQuery = query(msgCollectionRef, orderBy("timestamp", "asc"));

            unsubscribeMessagesSub = onSnapshot(msgQuery, async (snapshot) => {
                if (activeChatUserId !== targetUid) return;
                
                let messagesHTML = "";
                const batch = writeBatch(db);
                let needsBatchUpdate = false;

                if(snapshot.empty){
                    messagesDisplay.innerHTML = `<p style="text-align:center; padding:20px; color:var(--text-muted); font-size:0.85rem;">Encryption enabled. Secure logs empty.</p>`;
                    return;
                }

                snapshot.forEach(doc => {
                    const msgData = doc.data();
                    if (msgData.senderId === targetUid && msgData.status !== "seen") {
                        batch.update(doc.ref, { status: "seen" });
                        needsBatchUpdate = true;
                        msgData.status = "seen"; 
                    }
                    messagesHTML += getSingleMessageBubbleHTML(msgData, doc.id);
                });

                if (needsBatchUpdate) {
                    try { await batch.commit(); } catch(e) {}
                }

                messagesDisplay.innerHTML = messagesHTML;
                
                // Initialize Custom Premium Audio Engine Triggers inside View
                snapshot.forEach(doc => {
                    const msgData = doc.data();
                    if(msgData.voiceNotes) {
                        initCustomAudioPlayerInstance(doc.id, msgData.voiceNotes);
                    }
                });

                messagesDisplay.scrollTop = messagesDisplay.scrollHeight;
            });
        }

        /* ==================== MEDIA ATTACHMENTS ARCHITECTURE ==================== */
        
        function resetAttachmentQueue() {
            inboxSelectedBase64Image = null;
            inboxSelectedVoiceBase64 = null;
            inboxFileInput.value = "";
            inboxPreviewImgSrc.src = "";
            inboxPreviewImgSrc.classList.add("hidden");
            inboxImgPreviewBar.classList.add("hidden");
            messageForm.classList.remove("voice-recording-active");
        }

        inboxPhotoTriggerBtn.addEventListener("click", () => inboxFileInput.click());

        inboxFileInput.addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 1.5 * 1024 * 1024) {
                    alert("Image exceeds 1.5MB size compression tier constraints.");
                    resetAttachmentQueue();
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(event) {
                    resetAttachmentQueue();
                    inboxSelectedBase64Image = event.target.result;
                    inboxPreviewImgSrc.src = inboxSelectedBase64Image;
                    inboxPreviewImgSrc.classList.remove("hidden");
                    attachmentStatusText.innerText = "Photo attachment ready to push...";
                    inboxImgPreviewBar.classList.remove("hidden");
                };
                reader.readAsDataURL(file);
            }
        });

        /* Premium Voice Core Recording Pipeline */
        inboxVoiceTriggerBtn.addEventListener("click", async () => {
            if (!isVoiceRecording) {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    alert("Recording module failed: Media execution context absent.");
                    return;
                }
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.addEventListener("dataavailable", event => {
                        audioChunks.push(event.data);
                    });

                    mediaRecorder.addEventListener("stop", () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            inboxSelectedVoiceBase64 = reader.result;
                            inboxPreviewImgSrc.classList.add("hidden");
                            attachmentStatusText.innerText = "🎙️ Premium voice note recorded. Press send.";
                            inboxImgPreviewBar.classList.remove("hidden");
                        };
                        reader.readAsDataURL(audioBlob);
                        stream.getTracks().forEach(track => track.stop());
                    });

                    mediaRecorder.start();
                    isVoiceRecording = true;
                    messageForm.classList.add("voice-recording-active");
                    showToast("Recording transmission initialized...");
                } catch (err) {
                    alert("Microphone node allocation rejected.");
                }
            } else {
                if (mediaRecorder && mediaRecorder.state !== "inactive") {
                    mediaRecorder.stop();
                }
                isVoiceRecording = false;
                messageForm.classList.remove("voice-recording-active");
            }
        });

        cancelInboxImgBtn.addEventListener("click", () => {
            if (isVoiceRecording) {
                if (mediaRecorder && mediaRecorder.state !== "inactive") {
                    mediaRecorder.stop();
                }
                isVoiceRecording = false;
            }
            resetAttachmentQueue();
        });

        // Optimized Open-Source Gifs Loader Module
        inboxGifTriggerBtn.addEventListener("click", () => {
            gifPanel.classList.toggle("hidden");
            if(!gifPanel.classList.contains("hidden")) {
                loadTrendingGifs();
            }
        });

        closeGifBtn.addEventListener("click", () => gifPanel.classList.add("hidden"));

        async function loadTrendingGifs() {
            gifResults.innerHTML = "<p style='grid-column: span 3; text-align:center; font-size:0.8rem; color:var(--text-muted);'>Syncing GIFs...</p>";
            try {
                // High performance open source anonymous mirror engine configuration
                const res = await fetch(`https://api.giphy.com/v1/gifs/trending?api_key=dc6zaTOxFJmzC&limit=12&rating=g`);
                const json = await res.json();
                renderGifs(json.data);
            } catch(e) {
                gifResults.innerHTML = "<p style='grid-column: span 3; text-align:center; color:red; font-size:0.8rem;'>Engine error. Retry.</p>";
            }
        }

        gifSearchInput.addEventListener("input", debounce(async () => {
            const queryText = gifSearchInput.value.trim();
            if(!queryText) { loadTrendingGifs(); return; }
            gifResults.innerHTML = "<p style='grid-column: span 3; text-align:center; font-size:0.8rem; color:var(--text-muted);'>Searching...</p>";
            try {
                const res = await fetch(`https://api.giphy.com/v1/gifs/search?api_key=dc6zaTOxFJmzC&q=${encodeURIComponent(queryText)}&limit=15&rating=g`);
                const json = await res.json();
                renderGifs(json.data);
            } catch(e) {}
        }, 400));

        function renderGifs(gifDataArray) {
            gifResults.innerHTML = "";
            if(!gifDataArray || gifDataArray.length === 0) {
                gifResults.innerHTML = "<p style='grid-column: span 3; text-align:center; font-size:0.8rem; color:var(--text-muted);'>No GIFs found.</p>";
                return;
            }
            gifDataArray.forEach(gif => {
                const url = gif.images.fixed_height_small.url;
                const img = document.createElement("img");
                img.src = url;
                img.addEventListener("click", () => {
                    sendSecureMessage("[GIF]", url); 
                    gifPanel.classList.add("hidden");
                    gifSearchInput.value = "";
                });
                gifResults.appendChild(img);
            });
        }

        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        /* Message Dispatch Pipeline */
        messageForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            if (isVoiceRecording) {
                if (mediaRecorder && mediaRecorder.state !== "inactive") {
                    mediaRecorder.stop();
                }
                isVoiceRecording = false;
                messageForm.classList.remove("voice-recording-active");
                return; 
            }

            const txt = messageInput.value.trim();
            if (!txt && !inboxSelectedBase64Image && !inboxSelectedVoiceBase64) return;

            let textToSend = txt;
            if(!textToSend) {
                if (inboxSelectedBase64Image) textToSend = "[Photo Attachment]";
                else if (inboxSelectedVoiceBase64) textToSend = "[Voice Note]";
            }

            const imgToSend = inboxSelectedBase64Image;
            const voiceToSend = inboxSelectedVoiceBase64;

            resetAttachmentQueue();
            messageInput.value = "";

            await sendSecureMessage(textToSend, null, imgToSend, voiceToSend);
        });

        async function sendSecureMessage(textContent, customGifUrl = null, customAttachedImageBase64 = null, customVoiceBase64 = null) {
            if (!activeChatUserId || !currentUser) return;
            
            clearTimeout(typingTimeout);
            try { await updateDoc(doc(db, "users", currentUser.uid), { isTypingTo: null }); } catch(err){}

            const currentTimestamp = new Date().getTime();
            const roomId = getChatRoomId(currentUser.uid, activeChatUserId);

            let initialStatus = "sent";
            try {
                const targetUserSnap = await getDoc(doc(db, "users", activeChatUserId));
                if (targetUserSnap.exists()) {
                    const targetData = targetUserSnap.data();
                    if (targetData.status === "online" && (targetData.isTypingTo === currentUser.uid || targetData.activeChatWith === currentUser.uid)) {
                        initialStatus = "seen";
                    } else if (targetData.status === "online") {
                        initialStatus = "delivered";
                    }
                }
            } catch(e) {}

            try {
                const chatRoomRef = doc(db, "friendships", roomId);
                const msgCollectionRef = collection(chatRoomRef, "chat_messages");

                const payload = {
                    senderId: currentUser.uid,
                    receiverId: activeChatUserId,
                    text: textContent,
                    timestamp: currentTimestamp,
                    status: initialStatus
                };

                if(customGifUrl) payload.gifUrl = customGifUrl;
                if(customAttachedImageBase64) payload.attachedImage = customAttachedImageBase64;
                if(customVoiceBase64) payload.voiceNotes = customVoiceBase64;

                await addDoc(msgCollectionRef, payload);

                let systemLogPreview = textContent;
                if(customGifUrl) systemLogPreview = "🎬 Sent a GIF";
                if(customAttachedImageBase64) systemLogPreview = "📷 Sent a Photo";
                if(customVoiceBase64) systemLogPreview = "🎵 Sent a Voice Note";

                await setDoc(chatRoomRef, {
                    user1: currentUser.uid < activeChatUserId ? currentUser.uid : activeChatUserId,
                    user2: currentUser.uid < activeChatUserId ? activeChatUserId : currentUser.uid,
                    lastMessage: systemLogPreview,
                    timestamp: currentTimestamp
                }, { merge: true });

            } catch(err) { 
                showToast("Transmission halted.");
            }
        }

        /* HTML Generation Node Mapping */
        function getSingleMessageBubbleHTML(msgData, msgId) {
            const isSent = msgData.senderId === currentUser.uid;
            const rowClass = isSent ? "msg-row sent" : "msg-row received";

            let timeString = "Just Now";
            if (msgData.timestamp) {
                timeString = new Date(msgData.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }

            let tickHTML = "";
            if (isSent) {
                const currentStatus = msgData.status || "sent";
                if (currentStatus === "seen") {
                    tickHTML = `<span class="status-tick seen"><i class="fas fa-check-double"></i></span>`;
                } else if (currentStatus === "delivered") {
                    tickHTML = `<span class="status-tick delivered"><i class="fas fa-check-double"></i></span>`;
                } else {
                    tickHTML = `<span class="status-tick sent"><i class="fas fa-check"></i></span>`;
                }
            }

            let mediaEmbedHTML = "";
            if(msgData.attachedImage) {
                mediaEmbedHTML = `<img src="${msgData.attachedImage}" class="msg-media-content" alt="Photo" onclick="window.open('${msgData.attachedImage}', '_blank')">`;
            } else if(msgData.gifUrl) {
                mediaEmbedHTML = `<img src="${msgData.gifUrl}" class="msg-media-content" alt="GIF">`;
            } else if(msgData.voiceNotes) {
                // UI Fix: Injection of Premium Customized Audio Elements Container
                mediaEmbedHTML = `
                    <div class="premium-audio-player" id="player-container-${msgId}">
                        <button type="button" class="audio-control-btn" id="play-btn-${msgId}"><i class="fas fa-play"></i></button>
                        <div class="audio-timeline-track" id="track-${msgId}">
                            <div class="audio-timeline-fill" id="fill-${msgId}"></div>
                        </div>
                        <span class="audio-time-stamp" id="time-${msgId}">0:00</span>
                    </div>
                `;
            }

            const isPlaceholderText = (msgData.text === "[Photo Attachment]" || msgData.text === "[GIF]" || msgData.text === "[Voice Note]");
            const displayableText = isPlaceholderText ? "" : `<p style="word-break: break-word; white-space: pre-wrap;">${escapeHTML(msgData.text)}</p>`;

            return `
                <div class="${rowClass}">
                    <div class="msg-bubble">
                        ${displayableText}
                        ${mediaEmbedHTML}
                        <div class="msg-meta-wrapper">
                            <span class="msg-meta">${timeString}</span>
                            ${tickHTML}
                        </div>
                    </div>
                </div>
            `;
        }

        /* Custom Audio Controller Instances Generator Engine */
        function initCustomAudioPlayerInstance(msgId, base64AudioData) {
            const playBtn = document.getElementById(`play-btn-${msgId}`);
            const track = document.getElementById(`track-${msgId}`);
            const fill = document.getElementById(`fill-${msgId}`);
            const timeLabel = document.getElementById(`time-${msgId}`);
            
            if(!playBtn || window.activeAudioNodes.has(msgId)) return;

            const audioObj = new Audio(base64AudioData);
            window.activeAudioNodes.set(msgId, { audio: audioObj, isPlaying: false });

            // Render native length metadata
            audioObj.addEventListener("loadedmetadata", () => {
                timeLabel.innerText = formatAudioDuration(audioObj.duration);
            });

            playBtn.addEventListener("click", () => {
                const state = window.activeAudioNodes.get(msgId);
                if(state.isPlaying) {
                    audioObj.pause();
                } else {
                    // Turn down other active audios
                    window.activeAudioNodes.forEach((node, id) => {
                        if(id !== msgId && node.isPlaying) {
                            node.audio.pause();
                        }
                    });
                    audioObj.play().catch(()=>{});
                }
            });

            audioObj.addEventListener("play", () => {
                window.activeAudioNodes.get(msgId).isPlaying = true;
                playBtn.innerHTML = `<i class="fas fa-pause"></i>`;
            });

            audioObj.addEventListener("pause", () => {
                window.activeAudioNodes.get(msgId).isPlaying = false;
                playBtn.innerHTML = `<i class="fas fa-play"></i>`;
            });

            audioObj.addEventListener("timeupdate", () => {
                const progress = (audioObj.currentTime / audioObj.duration) * 100;
                fill.style.width = `${progress || 0}%`;
                timeLabel.innerText = formatAudioDuration(audioObj.currentTime);
            });

            audioObj.addEventListener("ended", () => {
                fill.style.width = "0%";
                timeLabel.innerText = formatAudioDuration(audioObj.duration);
                playBtn.innerHTML = `<i class="fas fa-play"></i>`;
                window.activeAudioNodes.get(msgId).isPlaying = false;
            });

            track.addEventListener("click", (e) => {
                const rect = track.getBoundingClientRect();
                const clickPosition = (e.clientX - rect.left) / rect.width;
                audioObj.currentTime = clickPosition * audioObj.duration;
            });
        }

        function formatAudioDuration(secs) {
            if(isNaN(secs)) return "0:00";
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                const appContainerEl = document.getElementById("app-container");
                if (appContainerEl) {
                    appContainerEl.style.height = `${window.visualViewport.height}px`;
                    appContainerEl.style.top = `${window.visualViewport.offsetTop}px`;
                }
                if(activeChatUserId) {
                    setTimeout(() => { messagesDisplay.scrollTop = messagesDisplay.scrollHeight; }, 100);
                }
            });
        }

        if(backToSidebar) {
            backToSidebar.addEventListener("click", async () => {
                appSidebar.classList.remove("mobile-hidden");
                chatWindowView.classList.remove("mobile-active");
                activeChatView.classList.add("hidden");
                welcomeView.classList.remove("hidden");
                activeChatUserId = null;
                
                window.activeAudioNodes.forEach(node => node.audio.pause());
                if(unsubscribeTargetUserStatus) unsubscribeTargetUserStatus();
            });
        }

        searchInput.addEventListener("input", async () => {
            const searchText = searchInput.value.trim().toLowerCase();
            if(!searchText) { switchTab(activeTab); return; }
            if(unsubscribeRealtimeStream) { unsubscribeRealtimeStream(); unsubscribeRealtimeStream = null; }

            const userSnap = await getDocs(query(collection(db, "users")));
            activeChatsList.innerHTML = "";
            let found = false;
            userSnap.forEach(uDoc => {
                const u = uDoc.data();
                if(u.uid !== currentUser.uid && u.username.toLowerCase().includes(searchText)) {
                    found = true;
                    renderUserRow(u, `@${u.username}`, "action", `<button class="action-btn-sm btn-pink" onclick="window.openChatWindowWithTargetUser('${u.uid}')">Message</button>`);
                }
            });
            if(!found) activeChatsList.innerHTML = `<p style="padding:20px; text-align:center; color:var(--text-muted);">No identities matching query strings.</p>`;
        });

        function setProfileModalMode(isViewMode) {
            if (isViewMode) {
                modalTitle.innerText = "User Profile";
                modalSubtitle.innerText = "Network details of the connected node";
                uploadDpLabel.classList.add("hidden");
                profileSaveBtn.classList.add("hidden");
                profileName.disabled = true;
                profileAge.disabled = true;
                profileFrom.disabled = true;
                profileProfession.disabled = true;
            } else {
                modalTitle.innerText = "Edit Profile";
                modalSubtitle.innerText = "Update your network identity and details";
                uploadDpLabel.classList.remove("hidden");
                profileSaveBtn.classList.remove("hidden");
                profileName.disabled = false;
                profileAge.disabled = false;
                profileFrom.disabled = false;
                profileProfession.disabled = false;
            }
        }

        if (openProfileBtn) {
            openProfileBtn.addEventListener("click", async () => {
                if (!currentUser) return;
                setProfileModalMode(false);
                profileModal.classList.remove("hidden");
                try {
                    const userDocSnap = await getDoc(doc(db, "users", currentUser.uid));
                    if (userDocSnap.exists()) {
                        const userData = userDocSnap.data();
                        profileName.value = userData.fullName || currentUser.displayName || "";
                        profileAge.value = userData.age || "";
                        profileFrom.value = userData.from || "";
                        profileProfession.value = userData.profession || "";
                        modalPreviewAvatar.src = userData.photoURL || currentUser.photoURL || "https://via.placeholder.com/90";
                    }
                } catch (e) {}
            });
        }

        if (targetUserProfileTrigger) {
            targetUserProfileTrigger.addEventListener("click", async () => {
                if (!activeChatUserId) return;
                setProfileModalMode(true);
                profileModal.classList.remove("hidden");
                try {
                    const targetDocSnap = await getDoc(doc(db, "users", activeChatUserId));
                    if (targetDocSnap.exists()) {
                        const targetData = targetDocSnap.data();
                        profileName.value = targetData.fullName || targetData.username || "Anonymous";
                        profileAge.value = targetData.age || "Not Specified";
                        profileFrom.value = targetData.from || "Not Specified";
                        profileProfession.value = targetData.profession || "Not Specified";
                        modalPreviewAvatar.src = targetData.photoURL || "https://via.placeholder.com/90";
                    }
                } catch (e) {}
            });
        }

        if (closeProfileBtn) {
            closeProfileBtn.addEventListener("click", () => {
                profileModal.classList.add("hidden");
                selectedFile = null;
            });
        }

        if (profileDpInput) {
            profileDpInput.addEventListener("change", (e) => {
                const file = e.target.files[0];
                if (file) {
                    selectedFile = file;
                    const reader = new FileReader();
                    reader.onload = function(event) { modalPreviewAvatar.src = event.target.result; };
                    reader.readAsDataURL(file);
                }
            });
        }

        if (profileUpdateForm) {
            profileUpdateForm.addEventListener("submit", async (e) => {
                e.preventDefault();
                if (!currentUser) return;

                profileSaveBtn.disabled = true;
                profileSaveBtn.innerText = "Synchronizing...";
                let downloadURL = modalPreviewAvatar.src; 

                const convertFileToBase64 = (file) => {
                    return new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.readAsDataURL(file);
                        reader.onload = () => resolve(reader.result);
                        reader.onerror = (error) => reject(error);
                    });
                };

                try {
                    if (selectedFile) {
                        if (selectedFile.size > 2 * 1024 * 1024) {
                            alert("Image size must be strictly kept under 2MB.");
                            profileSaveBtn.disabled = false;
                            profileSaveBtn.innerText = "Save Profile";
                            return;
                        }
                        downloadURL = await convertFileToBase64(selectedFile);
                    }

                    try {
                        await updateProfile(currentUser, {
                            displayName: profileName.value.trim(),
                            photoURL: downloadURL.startsWith('data:') ? currentUser.photoURL : downloadURL
                        });
                    } catch(authErr) {}

                    await setDoc(doc(db, "users", currentUser.uid), {
                        fullName: profileName.value.trim(),
                        age: Number(profileAge.value),
                        from: profileFrom.value.trim(),
                        profession: profileProfession.value.trim(),
                        photoURL: downloadURL,
                        updatedAt: new Date().getTime()
                    }, { merge: true });

                    showToast("Profile pipeline updated!");
                    profileModal.classList.add("hidden");
                    selectedFile = null;
                } catch (error) {
                    showToast("Sync failed.");
                } finally {
                    profileSaveBtn.disabled = false;
                    profileSaveBtn.innerText = "Save Profile";
                }
            });
        }

        function showToast(msg) {
            const toast = document.getElementById("app-notification");
            if(toast) {
                toast.innerText = msg;
                toast.classList.remove("hidden");
                setTimeout(() => toast.classList.add("hidden"), 3000);
            }
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }
    </script>
</body>
